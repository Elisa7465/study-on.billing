name: CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setting environment
        run: |
          cat << 'EOF' > .env.local
          DATABASE_URL="pgsql://pguser:pguser@postgres:5432/study_on_billing"
          JWT_SECRET_KEY="%kernel.project_dir%/config/jwt/private.pem"
          JWT_PUBLIC_KEY="%kernel.project_dir%/config/jwt/public.pem"
          JWT_PASSPHRASE="1234"
          EOF

          cat << 'EOF' > .env.test.local
          DATABASE_URL="pgsql://pguser:pguser@postgres:5432/study_on_billing"
          JWT_SECRET_KEY="%kernel.project_dir%/config/jwt/private.pem"
          JWT_PUBLIC_KEY="%kernel.project_dir%/config/jwt/public.pem"
          JWT_PASSPHRASE="1234"
          EOF

      - name: Setting Docker
        run: |
          docker-compose build
          docker-compose up -d
          docker ps -a

      - name: Composer install inside container
        run: |
          docker-compose exec -T php composer install --no-interaction --prefer-dist

      - name: Wait for PostgreSQL
        run: |
          until docker-compose exec -T postgres pg_isready -U pguser; do
            sleep 1
          done

      - name: Setting JWT
        run: |
          docker-compose exec -T php php bin/console lexik:jwt:generate-keypair --overwrite --env=test

      - name: Setting test DB
        run: |
          docker-compose exec -T php php bin/console doctrine:database:drop --force --if-exists --env=test || true
          docker-compose exec -T php php bin/console doctrine:database:create --if-not-exists --env=test
          docker-compose exec -T php php bin/console doctrine:migrations:migrate -n --env=test
          docker-compose exec -T php php bin/console doctrine:fixtures:load -n --env=test

      - name: Run PHPUnit
        run: |
          docker-compose exec -T php php bin/phpunit