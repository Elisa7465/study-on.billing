version: "3.1"

volumes:
    postgres: ~
    composer_cache: ~
    vendor_cache: ~
    cache_prod: ~

services:
    nginx:
        image: nginx:alpine
        container_name: billing.study-on.local
        working_dir: /app
        volumes:
            - .:/app
            - ./docker/hosts/app.conf:/etc/nginx/conf.d/default.conf
            - ./docker/hosts/symfony:/etc/nginx/symfony
        ports:
            - "${NGINX_PORT}:80"
        links:
            - php

    postgres:
        image: postgres:alpine
        ports:
            - "127.0.0.1:5434:5432"
        volumes:
            - postgres:/var/lib/postgresql/18/docker
        environment:
            POSTGRES_USER: pguser
            POSTGRES_PASSWORD: pguser

    php:
        build: docker/images/php
        working_dir: /app
        volumes:
            - .:/app
            - composer_cache:/composer-cache
            - vendor_cache:/app/vendor
            - cache_prod:/app/var/cache
        environment:
            - COMPOSER_ALLOW_SUPERUSER=1
            - COMPOSER_CACHE_DIR=/composer-cache
        links:
            - postgres